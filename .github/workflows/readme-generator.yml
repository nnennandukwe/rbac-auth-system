*Generated on {datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S UTC')}*
'''
          
          else:  # standard template
              features_list = '\\n'.join([f'- {feature}' for feature in info['features'][:10]])
              
              readme = f'''# {info['name']}

{badges}{info['description'] or 'A Role-Based Access Control (RBAC) authentication system built with FastAPI and SQLAlchemy.'}

## Features

{features_list}

## Quick Start

\`\`\`bash
# Clone the repository
git clone https://github.com/${{ github.repository }}.git
cd rbac-auth-system

# Install dependencies
pip install -r requirements.txt

# Run the server
python run_server.py
\`\`\`

The API will be available at `http://localhost:8000`

## API Documentation

- Interactive API docs: `http://localhost:8000/docs`
- Alternative API docs: `http://localhost:8000/redoc`

## Default Credentials

- Username: `admin`
- Password: `admin123`

## Testing

\`\`\`bash
pytest
\`\`\`

## Project Structure

\`\`\`
rbac-auth-system/
├── app/                # Application code
├── tests/              # Test suite
├── alembic/            # Database migrations
├── logs/               # Log files
└── requirements.txt    # Dependencies
\`\`\`

---

*Last updated: {datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S UTC')}*
'''
          
          # Save generated README
          with open('README_generated.md', 'w') as f:
              f.write(readme)
          "
      
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'docs: Generate new README from codebase analysis'
          title: 'Generated README Update (${{ github.event.inputs.template }} template)'
          body: |
            ## Generated README Update
            
            This PR contains a newly generated README based on automated code analysis.
            
            ### Generation Details:
            - Template used: **${{ github.event.inputs.template }}**
            - Include badges: **${{ github.event.inputs.include_badges }}**
            - Generated from: Latest codebase analysis
            
            ### What was analyzed:
            - ✅ Project structure and files
            - ✅ Database models
            - ✅ API routes and endpoints
            - ✅ Features and capabilities
            - ✅ Dependencies and requirements
            
            ### Next Steps:
            1. Review the generated content
            2. Make any necessary manual adjustments
            3. Merge if the content is accurate
            
            The generated README is saved as `README_generated.md` for comparison.
          branch: generate-readme-${{ github.run_number }}
          delete-branch: true
          labels: |
            documentation
            automated
            generated